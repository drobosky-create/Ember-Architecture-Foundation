kind = "web"
previewPath = "/"
title = "Ember"
version = "1.0.0"
id = "artifacts/ember"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22809

[services.development]
run = "pnpm --filter @workspace/ember run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ember", "run", "build" ]
publicDir = "artifacts/ember/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22809"
BASE_PATH = "/"
