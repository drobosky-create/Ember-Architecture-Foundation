<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Ember — favicon.svg (coal form, baked colors)
    Optimized for 16–32px. Simplified 8-point polygon for small sizes.
  -->
  <defs>
    <radialGradient id="fav-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF8A5B"/>
      <stop offset="30%"  stop-color="#E8613A"/>
      <stop offset="68%"  stop-color="#2E1406"/>
      <stop offset="100%" stop-color="#0E0602"/>
    </radialGradient>
    <radialGradient id="fav-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF9A6C"/>
      <stop offset="100%" stop-color="#FF9A6C" stop-opacity="0"/>
    </radialGradient>
    <filter id="fav-glow">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="fav-core-blur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <rect width="32" height="32" fill="#080808"/>

  <!-- Outer glow -->
  <ellipse cx="16" cy="16" rx="11" ry="10" fill="#FF8A5B" opacity="0.18" filter="url(#fav-glow)"/>

  <!-- Coal polygon — 8-point, simplified for favicon -->
  <polygon
    points="16,4 21,5.5 25,9 26.5,14 26.5,18 25,23 21,26.5 16,28 11,26.5 7,23 5.5,18 5.5,14 7,9 11,5.5"
    fill="url(#fav-shell)"
  />

  <!-- Core -->
  <ellipse cx="16" cy="16" rx="5" ry="4.5" fill="url(#fav-core)" filter="url(#fav-core-blur)"/>
</svg>
