<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!--
    Ember — Inverse lockup (light background, coal form)
    Mark: ember orange gradient. Wordmark: coal dark.
    CSS vars: --ember-flame, --ember-flame-bright, --ember-core, --ember-coal
  -->
  <defs>
    <radialGradient id="inv-shell" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)"/>
      <stop offset="45%"  stop-color="var(--ember-flame)"/>
      <stop offset="100%" stop-color="#B84B2A"/>
    </radialGradient>
    <radialGradient id="inv-core" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="var(--ember-core)"/>
      <stop offset="100%" stop-color="var(--ember-core)" stop-opacity="0"/>
    </radialGradient>
    <filter id="inv-core-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <g transform="translate(8, 8) scale(0.64)">
    <g id="flame">
      <polygon
        points="50,18 62,21 72,28 78,38 78,50 78,62 72,72 62,79 50,82 38,79 28,72 22,62 22,50 22,38 28,28 38,21"
        fill="url(#inv-shell)"
      />
    </g>
    <g id="core" filter="url(#inv-core-blur)">
      <ellipse cx="50" cy="50" rx="16" ry="14" fill="url(#inv-core)" opacity="0.5"/>
    </g>
  </g>

  <g fill="var(--ember-coal)">
    <g transform="translate(90, 22)">
      <rect x="0" y="0" width="5" height="36"/>
      <rect x="0" y="0" width="22" height="5"/>
      <rect x="0" y="15.5" width="18" height="5"/>
      <rect x="0" y="31" width="22" height="5"/>
    </g>
    <g transform="translate(120, 22)">
      <rect x="0" y="0" width="5" height="36"/>
      <rect x="21" y="0" width="5" height="36"/>
      <polygon points="0,0 5,0 15,20 10,20"/>
      <polygon points="21,0 26,0 16,20 11,20"/>
    </g>
    <g transform="translate(154, 22)">
      <rect x="0" y="0" width="5" height="36"/>
      <rect x="0" y="0" width="16" height="5"/>
      <rect x="0" y="15.5" width="16" height="5"/>
      <rect x="0" y="31" width="16" height="5"/>
      <rect x="11" y="5" width="5" height="10.5" rx="2.5"/>
      <rect x="11" y="20.5" width="5" height="10.5" rx="2.5"/>
    </g>
    <g transform="translate(184, 22)">
      <rect x="0" y="0" width="5" height="36"/>
      <rect x="0" y="0" width="22" height="5"/>
      <rect x="0" y="15.5" width="18" height="5"/>
      <rect x="0" y="31" width="22" height="5"/>
    </g>
    <g transform="translate(214, 22)">
      <rect x="0" y="0" width="5" height="36"/>
      <rect x="0" y="0" width="16" height="5"/>
      <rect x="0" y="15.5" width="16" height="5"/>
      <rect x="11" y="5" width="5" height="10.5" rx="2.5"/>
      <polygon points="5,20.5 10,20.5 22,36 17,36"/>
    </g>
  </g>
</svg>
