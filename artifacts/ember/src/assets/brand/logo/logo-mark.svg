<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Ember — Mark only (stable/default state, coal form)
    CSS vars: --ember-flame, --ember-flame-bright, --ember-core, --ember-glow
  -->
  <defs>
    <radialGradient id="lm-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-glow)"       stop-opacity="0.28"/>
      <stop offset="100%" stop-color="var(--ember-glow)"       stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lm-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)"/>
      <stop offset="32%"  stop-color="var(--ember-flame)"/>
      <stop offset="68%"  stop-color="#2E1406"/>
      <stop offset="100%" stop-color="#160802"/>
    </radialGradient>
    <radialGradient id="lm-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-core)"/>
      <stop offset="55%"  stop-color="var(--ember-flame-bright)" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="var(--ember-flame)"        stop-opacity="0"/>
    </radialGradient>
    <filter id="lm-halo-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <filter id="lm-core-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <g id="glow" filter="url(#lm-halo-blur)">
    <ellipse cx="50" cy="50" rx="36" ry="32" fill="url(#lm-halo)"/>
  </g>
  <g id="flame">
    <polygon
      points="50,18 62,21 72,28 78,38 78,50 78,62 72,72 62,79 50,82 38,79 28,72 22,62 22,50 22,38 28,28 38,21"
      fill="url(#lm-shell)"
    />
  </g>
  <g id="core" filter="url(#lm-core-blur)">
    <ellipse cx="50" cy="50" rx="18" ry="16" fill="url(#lm-core)"/>
  </g>
</svg>
