<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Ember Mark — CRITICAL state
    Coal shell: same geometry. Internal light: barely alive. Red-shifted. Almost cold.
    Glow barely perceptible. Core is a faint ember point.
    CSS vars: --ember-critical, --ember-flame, --ember-glow
  -->
  <defs>
    <radialGradient id="cr-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-critical)" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="var(--ember-critical)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cr-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-critical)"/>
      <stop offset="22%"  stop-color="#4A1A10"/>
      <stop offset="58%"  stop-color="#160806"/>
      <stop offset="100%" stop-color="#0A0402"/>
    </radialGradient>
    <radialGradient id="cr-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="var(--ember-critical)"     stop-opacity="0.3"/>
      <stop offset="100%" stop-color="var(--ember-critical)"     stop-opacity="0"/>
    </radialGradient>
    <filter id="cr-halo-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <filter id="cr-core-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <g id="glow" filter="url(#cr-halo-blur)">
    <ellipse cx="50" cy="50" rx="22" ry="20" fill="url(#cr-halo)"/>
  </g>

  <g id="flame">
    <polygon
      points="
        50,18  62,21  72,28  78,38
        78,50  78,62  72,72  62,79
        50,82  38,79  28,72  22,62
        22,50  22,38  28,28  38,21
      "
      fill="url(#cr-shell)"
    />
  </g>

  <g id="core" filter="url(#cr-core-blur)">
    <ellipse cx="50" cy="50" rx="8" ry="7" fill="url(#cr-core)"/>
  </g>
</svg>
