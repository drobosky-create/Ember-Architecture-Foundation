<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Ember Mark — STRUGGLING state
    Coal shell: same geometry. Internal light: noticeably dimmed. Facets mostly dark.
    Glow weak. Core still present but reduced.
    CSS vars: --ember-flame, --ember-flame-bright, --ember-core, --ember-glow
  -->
  <defs>
    <radialGradient id="str-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-glow)"  stop-opacity="0.14"/>
      <stop offset="100%" stop-color="var(--ember-glow)"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="str-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame)"/>
      <stop offset="28%"  stop-color="#6B2E10"/>
      <stop offset="62%"  stop-color="#1E0C04"/>
      <stop offset="100%" stop-color="#0E0602"/>
    </radialGradient>
    <radialGradient id="str-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="var(--ember-flame)"        stop-opacity="0.4"/>
      <stop offset="100%" stop-color="var(--ember-flame)"        stop-opacity="0"/>
    </radialGradient>
    <filter id="str-halo-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="str-core-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <g id="glow" filter="url(#str-halo-blur)">
    <ellipse cx="50" cy="50" rx="30" ry="27" fill="url(#str-halo)"/>
  </g>

  <g id="flame">
    <polygon
      points="
        50,18  62,21  72,28  78,38
        78,50  78,62  72,72  62,79
        50,82  38,79  28,72  22,62
        22,50  22,38  28,28  38,21
      "
      fill="url(#str-shell)"
    />
  </g>

  <g id="core" filter="url(#str-core-blur)">
    <ellipse cx="50" cy="50" rx="13" ry="12" fill="url(#str-core)"/>
  </g>
</svg>
