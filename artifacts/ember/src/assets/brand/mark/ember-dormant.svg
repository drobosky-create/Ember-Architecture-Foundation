<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Ember Mark — DORMANT state
    Coal shell: same geometry. Internal light: gone. Cold grey ash. No glow. No core.
    The form is still here. The heat is not.
    CSS vars: --ember-dormant, --ember-ash-light
  -->
  <defs>
    <radialGradient id="d-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-ash-light)"/>
      <stop offset="45%"  stop-color="var(--ember-dormant)"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
  </defs>

  <!-- No glow -->
  <g id="glow"/>

  <!-- Coal shell — same polygon, fully desaturated -->
  <g id="flame">
    <polygon
      points="
        50,18  62,21  72,28  78,38
        78,50  78,62  72,72  62,79
        50,82  38,79  28,72  22,62
        22,50  22,38  28,28  38,21
      "
      fill="url(#d-shell)"
      opacity="0.5"
    />
  </g>

  <!-- No core — heat is gone -->
  <g id="core"/>
</svg>
