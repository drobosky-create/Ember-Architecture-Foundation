<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!--
    Companion Mark — DORMANT state
    Same coal polygon. Fully cold. Grey shell. No core. No glow.
    Emotional read: absent. Not gone — just not here right now.
    CSS vars: --ember-dormant, --ember-ash-light
  -->
  <defs>
    <radialGradient id="cd-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-ash-light)"/>
      <stop offset="45%"  stop-color="var(--ember-dormant)"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
  </defs>

  <g id="glow"/>
  <g id="companion-body">
    <polygon
      points="30,11 37,13 43,17 47,23 47,30 47,37 43,43 37,47 30,49 23,47 17,43 13,37 13,30 13,23 17,17 23,13"
      fill="url(#cd-shell)"
      opacity="0.45"
    />
  </g>
  <g id="core"/>
</svg>
