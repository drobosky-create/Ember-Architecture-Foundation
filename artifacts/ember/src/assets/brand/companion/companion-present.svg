<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!--
    Companion Mark — PRESENT state
    Same coal polygon as ember mark. Fully lit, warm, attentive.
    Emotional read: open, engaged, with you.
    CSS vars: --ember-flame, --ember-flame-bright, --ember-core, --ember-glow
  -->
  <defs>
    <radialGradient id="cp-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-glow)"       stop-opacity="0.38"/>
      <stop offset="100%" stop-color="var(--ember-glow)"       stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cp-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)"/>
      <stop offset="32%"  stop-color="var(--ember-flame)"/>
      <stop offset="68%"  stop-color="#2E1406"/>
      <stop offset="100%" stop-color="#160802"/>
    </radialGradient>
    <radialGradient id="cp-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-core)"/>
      <stop offset="55%"  stop-color="var(--ember-flame-bright)" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="var(--ember-flame)"        stop-opacity="0"/>
    </radialGradient>
    <filter id="cp-halo-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="cp-core-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>

  <g id="glow" filter="url(#cp-halo-blur)">
    <ellipse cx="30" cy="30" rx="22" ry="20" fill="url(#cp-halo)"/>
  </g>
  <g id="companion-body">
    <polygon
      points="30,11 37,13 43,17 47,23 47,30 47,37 43,43 37,47 30,49 23,47 17,43 13,37 13,30 13,23 17,17 23,13"
      fill="url(#cp-shell)"
    />
  </g>
  <g id="core" filter="url(#cp-core-blur)">
    <ellipse cx="30" cy="30" rx="11" ry="10" fill="url(#cp-core)"/>
  </g>
</svg>
