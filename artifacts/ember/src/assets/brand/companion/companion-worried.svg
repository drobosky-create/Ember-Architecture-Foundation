<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!--
    Companion Mark — WORRIED state
    Same coal polygon. Core noticeably dimmer. Glow weak.
    Emotional read: tense, contracted, watching.
    CSS vars: --ember-flame, --ember-flame-bright, --ember-glow
  -->
  <defs>
    <radialGradient id="cw-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-glow)"  stop-opacity="0.13"/>
      <stop offset="100%" stop-color="var(--ember-glow)"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cw-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame)"/>
      <stop offset="24%"  stop-color="#6B2E10"/>
      <stop offset="62%"  stop-color="#1E0C04"/>
      <stop offset="100%" stop-color="#0E0602"/>
    </radialGradient>
    <radialGradient id="cw-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--ember-flame-bright)" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="var(--ember-flame)"        stop-opacity="0.35"/>
      <stop offset="100%" stop-color="var(--ember-flame)"        stop-opacity="0"/>
    </radialGradient>
    <filter id="cw-halo-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="cw-core-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <g id="glow" filter="url(#cw-halo-blur)">
    <ellipse cx="30" cy="30" rx="17" ry="15" fill="url(#cw-halo)"/>
  </g>
  <g id="companion-body">
    <polygon
      points="30,11 37,13 43,17 47,23 47,30 47,37 43,43 37,47 30,49 23,47 17,43 13,37 13,30 13,23 17,17 23,13"
      fill="url(#cw-shell)"
    />
  </g>
  <g id="core" filter="url(#cw-core-blur)">
    <ellipse cx="30" cy="30" rx="7" ry="6" fill="url(#cw-core)"/>
  </g>
</svg>
